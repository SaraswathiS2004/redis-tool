name: redis-tool

services:

  builder:
    build:
      context: .
      dockerfile: containerfile
    image: redis-node
  
  redis-node-1:
    image: redis-node
    container_name: redis-node-1
    hostname: redis-node-1
    networks:
      redis-net:
        ipv4_address: 10.10.0.11
    volumes:
      - ./ssh_keys/id_rsa.pub:/root/.ssh/authorized_keys:ro
    restart: unless-stopped

  redis-node-2:
    image: redis-node
    container_name: redis-node-2
    hostname: redis-node-2
    networks:
      redis-net:
        ipv4_address: 10.10.0.12
    volumes:
      - ./ssh_keys/id_rsa.pub:/root/.ssh/authorized_keys:ro
    restart: unless-stopped

  redis-node-3:
    image: redis-node
    container_name: redis-node-3
    hostname: redis-node-3
    networks:
      redis-net:
        ipv4_address: 10.10.0.13
    volumes:
      - ./ssh_keys/id_rsa.pub:/root/.ssh/authorized_keys:ro
    restart: unless-stopped

  redis-node-4:
    image: redis-node
    container_name: redis-node-4
    hostname: redis-node-4
    networks:
      redis-net:
        ipv4_address: 10.10.0.14
    volumes:
      - ./ssh_keys/id_rsa.pub:/root/.ssh/authorized_keys:ro
    restart: unless-stopped

  redis-node-5:
    image: redis-node
    container_name: redis-node-5
    hostname: redis-node-5
    networks:
      redis-net:
        ipv4_address: 10.10.0.15
    volumes:
      - ./ssh_keys/id_rsa.pub:/root/.ssh/authorized_keys:ro
    restart: unless-stopped

  redis-node-6:
    image: redis-node
    container_name: redis-node-6
    hostname: redis-node-6
    networks:
      redis-net:
        ipv4_address: 10.10.0.16
    volumes:
      - ./ssh_keys/id_rsa.pub:/root/.ssh/authorized_keys:ro
    restart: unless-stopped

networks:
  redis-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24
          gateway: 10.10.0.1